<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One-Time Secret</title>
  </head>
  <body>
    <h1>One-Time Secret</h1>

    <section>
      <h2>Create secret</h2>
      <textarea id="secret" rows="6" cols="60" placeholder="Paste secret here"></textarea><br>
      <label>PIN (6-8 chars): <input id="pin" /></label>
      <button id="create">Create</button>
      <pre id="createResult"></pre>
    </section>

    <section>
      <h2>Retrieve secret</h2>
      <label>ID: <input id="rid" /></label><br>
      <label>Retrieval token: <input id="rtoken" /></label><br>
      <label>PIN: <input id="rpin" /></label>
      <button id="fetch">Fetch</button>
      <pre id="fetchResult"></pre>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
